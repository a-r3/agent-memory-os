<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Agent Memory OS Workflow: Context Pack to Writeback</title>
  <desc id="desc">Workflow diagram showing task request, MCP context compilation, retrieval and trust checks, runtime payload generation, execution, structured session delta writeback, and downstream hygiene, persistence, and reporting.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .step { rx: 26; ry: 26; stroke-width: 2.5; }
      .heading { font: 700 19px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .text { font: 14px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .note { font: 13px 'Segoe UI', Arial, sans-serif; fill: #334155; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="980"/>

  <text class="title" x="70" y="70">Context Compile → Execution → Writeback</text>
  <text class="subtitle" x="70" y="105">Canonical workflow for adapters, MCP, MemoryAPI, runtime payloads, and downstream Phase 6–15 operations.</text>

  <rect class="step" x="70" y="170" width="240" height="140" fill="#dbeafe" stroke="#2563eb"/>
  <text class="heading" x="95" y="212">1. Task Request</text>
  <text class="text" x="95" y="244">Codex, Claude, or generic runtime</text>
  <text class="text" x="95" y="266">asks for task-scoped memory context.</text>

  <rect class="step" x="370" y="170" width="280" height="140" fill="#dcfce7" stroke="#16a34a"/>
  <text class="heading" x="395" y="212">2. MCP Tool Entry</text>
  <text class="text" x="395" y="244">mcp/tools.py</text>
  <text class="text" x="395" y="266">MemoryTools.context_compile(...)</text>

  <rect class="step" x="710" y="170" width="330" height="140" fill="#fef3c7" stroke="#d97706"/>
  <text class="heading" x="735" y="212">3. MemoryAPI Orchestration</text>
  <text class="text" x="735" y="244">brain/api/memory_api.py</text>
  <text class="text" x="735" y="266">compile_context(...)</text>
  <text class="text" x="735" y="288">analyze_context_pack(...)</text>

  <rect class="step" x="1100" y="170" width="390" height="140" fill="#ede9fe" stroke="#7c3aed"/>
  <text class="heading" x="1125" y="212">4. Retrieval and Validation</text>
  <text class="text" x="1125" y="244">retrieval.py + ranking.py + linking.py</text>
  <text class="text" x="1125" y="266">context_compiler.py + budgeting.py</text>
  <text class="text" x="1125" y="288">context_pack_validation.py</text>

  <rect class="step" x="140" y="420" width="360" height="170" fill="#ffe4e6" stroke="#e11d48"/>
  <text class="heading" x="165" y="462">5. Trust and Governance Checks</text>
  <text class="text" x="165" y="494">trust.py validates write payloads and audits the corpus.</text>
  <text class="text" x="165" y="516">Phase 14 approval.py and policy_audit_worker.py</text>
  <text class="text" x="165" y="538">extend governance for higher-risk changes.</text>

  <rect class="step" x="560" y="420" width="480" height="170" fill="#e0f2fe" stroke="#0284c7"/>
  <text class="heading" x="585" y="462">6. context_pack and Runtime Payload</text>
  <text class="text" x="585" y="494">context_pack.schema.json defines the canonical packed shape.</text>
  <text class="text" x="585" y="516">summarization.py and runtime_payload_packer.py build</text>
  <text class="text" x="585" y="538">provider-facing runtime payloads without moving logic into adapters.</text>

  <rect class="step" x="1100" y="420" width="350" height="170" fill="#f3e8ff" stroke="#9333ea"/>
  <text class="heading" x="1125" y="462">7. Execution Handoff</text>
  <text class="text" x="1125" y="494">apps/gateway/routes/runtime.py</text>
  <text class="text" x="1125" y="516">apps/gateway/mcp/runtime_bridge.py</text>
  <text class="text" x="1125" y="538">adapters/* runtime templates and examples</text>

  <rect class="step" x="160" y="690" width="360" height="180" fill="#dcfce7" stroke="#15803d"/>
  <text class="heading" x="185" y="732">8. Structured Writeback</text>
  <text class="text" x="185" y="764">session_delta_write(...)</text>
  <text class="text" x="185" y="786">decision_register(...)</text>
  <text class="text" x="185" y="808">memory_write(...)</text>
  <text class="text" x="185" y="830">All flow through MemoryAPI and writeback.py</text>

  <rect class="step" x="600" y="690" width="400" height="180" fill="#fef9c3" stroke="#ca8a04"/>
  <text class="heading" x="625" y="732">9. Hygiene, Tiering, and Persistence</text>
  <text class="text" x="625" y="764">memory_hygiene.py, tiering.py, persistence.py</text>
  <text class="text" x="625" y="786">promotion.py, dedupe.py, archive.py</text>
  <text class="text" x="625" y="808">snapshots/, exports/, archives/ templates</text>

  <rect class="step" x="1080" y="690" width="410" height="180" fill="#e9d5ff" stroke="#7e22ce"/>
  <text class="heading" x="1105" y="732">10. Coordination and Operations</text>
  <text class="text" x="1105" y="764">coordination_plan.py and session_coordination_worker.py</text>
  <text class="text" x="1105" y="786">reporting_worker.py and routes/operations.py</text>
  <text class="text" x="1105" y="808">operations_report.template.json and recovery_notes.template.md</text>

  <path class="arrow" d="M310 240 L370 240"/>
  <path class="arrow" d="M650 240 L710 240"/>
  <path class="arrow" d="M1040 240 L1100 240"/>
  <path class="arrow" d="M1220 310 L1220 420"/>
  <path class="arrow" d="M875 310 L875 420"/>
  <path class="arrow" d="M510 505 L560 505"/>
  <path class="arrow" d="M1040 505 L1100 505"/>
  <path class="arrow" d="M1275 590 L1275 690"/>
  <path class="arrow" d="M800 590 L800 690"/>
  <path class="arrow" d="M360 590 L360 690"/>

  <text class="note" x="70" y="930">Illustration generated from the actual repository workflow. It follows the canonical path: adapter → MCP → MemoryAPI → retrieval/compiler/validation → runtime payload → execution → structured writeback → hygiene/persistence/operations.</text>
</svg>
